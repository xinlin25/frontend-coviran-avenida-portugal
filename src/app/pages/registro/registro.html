<div class="contenedor">
    <h1>Crea tu cuenta</h1>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

        <input type="text" placeholder="Nombre completo*" formControlName="nombreCompleto">

        <input type="text" placeholder="Teléfono*" formControlName="tlf">

        <input type="email" placeholder="Correo electrónico*" formControlName="correo">

        <input type="password" placeholder="Contraseña*" formControlName="password">

        <input type="text" placeholder="Dirección*" formControlName="direccion">

        <button type="submit" [disabled]="registerForm.invalid">
            Crear cuenta
        </button>

        <p>¿Ya tienes cuenta?</p>
        <a routerLink="/inicio-sesion">Iniciar Sesión</a>

    </form>

</div>
