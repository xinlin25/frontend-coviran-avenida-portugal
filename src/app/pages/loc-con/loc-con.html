<h1>Localización y Contacto</h1>

<div class="contenedor">
  <div class="contenedor-img">
    <img src="/img/contacto.jpg" alt="imagen de contacto" />
  </div>
  <div class="contenido">
    <div class="texto">
      <h2>CÁDIZ</h2>
      <p class="caption">11008, Cádiz</p>
      <br />
      <p><strong>Avenida Portugal, 1</strong></p>
      <br />
      <p><strong>Teléfono: </strong>956 289 607</p>
    </div>

    <div class="botones">
      <button (click)="buscar('Horario Supermercado Covirán Avenida Portugal Cádiz')">
        Horario
      </button>
      <button (click)="buscar('Como llegar a Coviran Avenida Portugal Cádiz')">Cómo Llegar</button>
      <button routerLink="">Comprar</button>
    </div>
  </div>
</div>

<div class="contenedor mapa-container">
  @if (mapLoading) {
    <div class="map-loading">
      <img src="/img/spinner.svg" alt="Cargando mapa..." />
    </div>
  }

  <iframe
    (load)="onMapLoad()"
    style="border: 0"
    allowfullscreen
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade"
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6413.265414882014!2d-6.286035049096097!3d36.514727301202704!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd0dd3cca7528889%3A0xc8089070920701d6!2sSupermercado%20Coviran!5e0!3m2!1ses!2ses!4v1766445414004!5m2!1ses!2ses"
  >
  </iframe>
</div>
