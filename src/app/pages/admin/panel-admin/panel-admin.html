<header class="navbar navbar-expand-lg navbar-light px-3">
  <div class="fila">
    <p (click)="volver()">&lt; Volver</p>
    <h2 class="navbar-brand mx-auto mb-0">Panel de Administración</h2>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#adminNavbar"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
  </div>

  <div class="collapse navbar-collapse" id="adminNavbar">
    <hr class="d-lg-none" />
    <nav class="ms-auto admin-nav">
      <a
        class="nav-link"
        routerLink="usuarios"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
        >Usuarios</a
      >
      <a class="nav-link" routerLink="productos" routerLinkActive="active-link">Productos</a>
      <a class="nav-link" routerLink="categorias" routerLinkActive="active-link">Categorías</a>
    </nav>
  </div>
</header>

<main>
  <router-outlet></router-outlet>
</main>
